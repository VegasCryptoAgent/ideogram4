name: CI

on:
  push:
    branches: [main, claude/cloaked-app-reverse-engineer-4umHY]
    paths:
      - 'cloaked-clone/**'
  pull_request:
    paths:
      - 'cloaked-clone/**'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloaked-clone

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloaked-clone/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit
