name: CI

on:
  push:
    branches: [main, claude/cloaked-app-reverse-engineer-4umHY]
    paths:
      - 'cloaked-clone/**'
  pull_request:
    paths:
      - 'cloaked-clone/**'

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloaked-clone

    # Build-time placeholders so Prisma/Next never fail on missing config.
    # These are NOT real secrets — runtime values come from Railway's env.
    env:
      DATABASE_URL: 'postgresql://user:pass@localhost:5432/build?schema=public'
      NEXTAUTH_SECRET: 'ci-build-placeholder-not-used-at-runtime'
      NEXTAUTH_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloaked-clone/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Production build (same gate Railway runs)
        run: npm run build
